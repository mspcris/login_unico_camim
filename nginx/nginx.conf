worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format with forwarded IP
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # OAuth2/OIDC requires larger header buffers (tokens can be large)
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;
    large_client_header_buffers 4 32k;

    # Security headers
    server_tokens off;

    # Upstream definition for the Node.js API
    upstream camim_api {
        server api:3000;
        keepalive 32;
    }

    # =========================================================
    # HTTP Server (port 80)
    # In production with SSL, this redirects to HTTPS.
    # In development (HTTP only), this serves the application.
    # =========================================================
    server {
        listen 80;
        server_name auth.camim.com.br localhost _;

        # --- Health check endpoint (no redirect) ---
        location /health {
            proxy_pass http://camim_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            access_log off;
        }

        # --- UNCOMMENT THIS BLOCK TO REDIRECT HTTP -> HTTPS IN PRODUCTION ---
        # return 301 https://$host$request_uri;

        # --- COMMENT OUT THIS LOCATION BLOCK WHEN USING SSL REDIRECT ABOVE ---
        location / {
            proxy_pass http://camim_api;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Required for WebSocket and keep-alive
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts for long-running requests
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Allow large payloads (needed for JWKS and token responses)
            client_max_body_size 10M;

            # Pass cookies correctly
            proxy_cookie_path / "/; SameSite=Lax";
        }
    }

    # =========================================================
    # HTTPS Server (port 443) - UNCOMMENT FOR PRODUCTION WITH SSL
    # =========================================================
    # To enable SSL:
    # 1. Place your certificate files in ./nginx/ssl/
    #    - ./nginx/ssl/fullchain.pem  (certificate + chain)
    #    - ./nginx/ssl/privkey.pem    (private key)
    # 2. Uncomment the server block below
    # 3. Uncomment the redirect in the HTTP server block above
    # 4. Comment out the location / block in the HTTP server above
    #
    # For Let's Encrypt with certbot:
    #   certbot certonly --webroot -w /var/www/certbot -d auth.camim.com.br
    #   Then copy the certs to ./nginx/ssl/
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name auth.camim.com.br;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    #     # Modern SSL configuration (TLS 1.2+ only)
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_timeout 1d;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_tickets off;
    #
    #     # HSTS (uncomment after confirming SSL works)
    #     # add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # Security headers
    #     add_header X-Frame-Options SAMEORIGIN always;
    #     add_header X-Content-Type-Options nosniff always;
    #     add_header X-XSS-Protection "1; mode=block" always;
    #     add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    #
    #     # OAuth2/OIDC large header buffers
    #     proxy_buffer_size          128k;
    #     proxy_buffers              4 256k;
    #     proxy_busy_buffers_size    256k;
    #     large_client_header_buffers 4 32k;
    #
    #     location / {
    #         proxy_pass http://camim_api;
    #
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #
    #         proxy_connect_timeout 60s;
    #         proxy_send_timeout 60s;
    #         proxy_read_timeout 60s;
    #
    #         client_max_body_size 10M;
    #
    #         proxy_cookie_path / "/; SameSite=Lax; Secure";
    #     }
    # }
}
