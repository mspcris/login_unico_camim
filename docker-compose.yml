version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: camim_auth_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-login_camim}
      POSTGRES_USER: ${POSTGRES_USER:-camim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - camim_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-camim} -d ${POSTGRES_DB:-login_camim}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: camim_auth_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - camim_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: camim_auth_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      ISSUER: ${ISSUER:-http://localhost}
      DATABASE_URL: postgresql://${POSTGRES_USER:-camim}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-login_camim}
      REDIS_URL: redis://redis:6379
      COOKIE_SECRET: ${COOKIE_SECRET}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@camim.com.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - camim_network

  nginx:
    image: nginx:alpine
    container_name: camim_auth_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - camim_network

volumes:
  postgres_data:
  redis_data:

networks:
  camim_network:
    driver: bridge
